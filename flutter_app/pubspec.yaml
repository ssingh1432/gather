name: gather_app
description: Gather MVP Flutter app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web: ^1.1.0    
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.1
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5
  flutter_dotenv: ^5.2.1
  flutter_image_compress: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  video_player: ^2.9.2
  gal: ^2.3.1
  http: ^1.2.2
  url_launcher: ^6.3.1
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/brand/
